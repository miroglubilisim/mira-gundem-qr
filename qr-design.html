<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mira Gündem QR</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #F5F5F5;
    }
    .qr-card {
      background: #FFFFFF;
      padding: 48px 48px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 520px;
    }
    .qr-wrapper {
      position: relative;
      width: 400px;
      height: 400px;
    }
    .qr-wrapper img.qr-img {
      width: 100%;
      height: 100%;
      display: block;
    }
    /* Real logo overlay in center — using actual brand PNG */
    .logo-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 110px;
      height: 76px;
      border-radius: 16px;
      overflow: hidden;
      background: #0D2B5C;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      border: 4px solid #FFFFFF;
      padding: 10px 12px;
    }
    .logo-overlay img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }
    /* Divider line */
    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #DC2626, #1E40AF);
      border-radius: 2px;
      margin: 24px 0 16px;
    }
    /* Slogan */
    .slogan {
      font-family: 'Outfit', sans-serif;
      font-size: 1.35rem;
      font-weight: 800;
      color: #1B2845;
      text-align: center;
      letter-spacing: -0.3px;
      line-height: 1.3;
    }
    .brand-sub {
      font-family: 'Outfit', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      color: #94A3B8;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="qr-card">
    <!-- QR Code with REAL logo overlay -->
    <div class="qr-wrapper">
      <img class="qr-img" src="qr-code.png" alt="Mira Gündem QR">
      <div class="logo-overlay">
        <!-- Using the ACTUAL official brand logo PNG from miragundem.com -->
        <img src="mira-logo.png" alt="mG">
      </div>
    </div>
    
    <!-- Divider -->
    <div class="divider"></div>
    
    <!-- Slogan -->
    <div class="slogan">Gündemi Yakalamak İçin Tara</div>
    <div class="brand-sub">Mira Gündem</div>
  </div>
</body>
</html>
