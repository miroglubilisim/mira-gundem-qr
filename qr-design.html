<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mira Gündem QR</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #F5F5F5;
    }
    .qr-card {
      background: #FFFFFF;
      padding: 48px 48px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 520px;
    }
    .qr-wrapper {
      position: relative;
      width: 400px;
      height: 400px;
    }
    .qr-wrapper img {
      width: 100%;
      height: 100%;
      display: block;
    }
    /* Logo overlay in center of QR */
    .logo-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90px;
      height: 90px;
      background: #1B2845;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      border: 4px solid #FFFFFF;
    }
    /* Divider line */
    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #DC2626, #1E40AF);
      border-radius: 2px;
      margin: 24px 0 16px;
    }
    /* Slogan */
    .slogan {
      font-family: 'Outfit', sans-serif;
      font-size: 1.35rem;
      font-weight: 800;
      color: #1B2845;
      text-align: center;
      letter-spacing: -0.3px;
      line-height: 1.3;
    }
    .brand-sub {
      font-family: 'Outfit', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      color: #94A3B8;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="qr-card">
    <!-- QR Code with logo overlay -->
    <div class="qr-wrapper">
      <img src="qr-code.png" alt="Mira Gündem QR">
      <div class="logo-overlay">
        <!-- Exact mG logo matching App Store -->
        <svg viewBox="0 0 100 62" width="54" height="36" xmlns="http://www.w3.org/2000/svg">
          <!-- m: wide semicircular arches, thick uniform stroke, rounded caps -->
          <path d="M4,56 L4,28 C4,10 14,3 24,3 C34,3 38,10 38,28 L38,56" 
                fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M38,56 L38,28 C38,10 48,3 58,3 C66,3 70,10 70,22" 
                fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- G: bold near-complete circle with crossbar, lighter but clearly visible -->
          <path d="M96,17 C92,7 85,2 76,2 C64,2 56,14 56,31 C56,48 64,60 76,60 C85,60 92,55 96,45 L96,34 L80,34" 
                fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
    
    <!-- Divider -->
    <div class="divider"></div>
    
    <!-- Slogan -->
    <div class="slogan">Gündemi Yakalamak İçin Tara</div>
    <div class="brand-sub">Mira Gündem</div>
  </div>
</body>
</html>
