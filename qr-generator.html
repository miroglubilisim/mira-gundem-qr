<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mira Gündem - QR Kod Oluşturucu</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      padding: 20px;
    }
    h1 { font-size: 1.5rem; color: #1B2845; margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 0.85rem; margin-bottom: 24px; }
    .config-section {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 500px;
      margin-bottom: 24px;
    }
    label { display: block; font-weight: 600; font-size: 0.85rem; color: #1B2845; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #2C3E6B; }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1B2845, #2C3E6B);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(27,40,69,0.3); }

    /* QR Output */
    .qr-output {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
      width: 100%;
      max-width: 500px;
    }
    .qr-frame {
      display: inline-block;
      padding: 24px;
      background: white;
      border-radius: 12px;
      position: relative;
    }
    #qrCanvas { display: block; }

    /* Logo overlay */
    .logo-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 60px;
      background: #2C3E6B;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      border: 3px solid white;
    }

    .cta-text {
      margin-top: 20px;
      font-size: 1.1rem;
      font-weight: 800;
      color: #1B2845;
      letter-spacing: -0.3px;
    }
    .cta-sub {
      font-size: 0.75rem;
      color: #C62828;
      font-weight: 600;
      margin-top: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .download-btns {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      justify-content: center;
    }
    .dl-btn {
      padding: 10px 20px;
      border: 2px solid #1B2845;
      border-radius: 10px;
      background: white;
      font-weight: 700;
      font-size: 0.85rem;
      color: #1B2845;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .dl-btn:hover { background: #1B2845; color: white; }
    .info { margin-top: 16px; font-size: 0.75rem; color: #999; }
  </style>
</head>
<body>

  <h1>Mira Gündem QR Kod Oluşturucu</h1>
  <p class="subtitle">Yönlendirme sayfasının URL'sini girin, taranabilir QR kod oluşturun</p>

  <div class="config-section">
    <label for="targetUrl">Hedef URL (redirect.html'in barındırıldığı adres)</label>
    <input type="url" id="targetUrl" value="https://mira-gundem-qr.vercel.app" placeholder="https://mira-gundem-qr.vercel.app">
    <button onclick="generateQR()">QR Kod Oluştur</button>
  </div>

  <div class="qr-output">
    <div class="qr-frame" id="qrFrame">
      <canvas id="qrCanvas" width="280" height="280"></canvas>
      <div class="logo-overlay">
        <svg viewBox="0 0 120 80" width="36" height="24" xmlns="http://www.w3.org/2000/svg">
          <path d="M8,70 L8,38 C8,20 18,10 28,10 C38,10 44,20 44,32 L44,70" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
          <path d="M44,70 L44,38 C44,20 54,10 64,10 C74,10 78,20 78,32" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
          <path d="M110,25 C105,15 95,10 85,10 C72,10 62,22 62,40 C62,58 72,70 85,70 C95,70 105,65 110,55 L110,42 L90,42" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
    <div class="cta-text">Gündemi Yakalamak İçin Tara</div>
    <div class="cta-sub">● Mira Gündem</div>

    <div class="download-btns">
      <a class="dl-btn" id="dlPng" download="mira-gundem-qr.png" href="#">PNG İndir</a>
      <a class="dl-btn" id="dlSvg" onclick="downloadSVG()" href="#">SVG İndir</a>
    </div>
    <p class="info">Hata düzeltme: H (High %30) — logolu QR için optimize edildi</p>
  </div>

  <script>
    function generateQR() {
      const url = document.getElementById('targetUrl').value.trim();
      if (!url) { alert('Lütfen bir URL girin'); return; }

      // QR code with HIGH error correction (for logo overlay)
      const qr = qrcode(0, 'H');
      qr.addData(url);
      qr.make();

      const canvas = document.getElementById('qrCanvas');
      const ctx = canvas.getContext('2d');
      const size = 280;
      const moduleCount = qr.getModuleCount();
      const cellSize = size / moduleCount;

      canvas.width = size;
      canvas.height = size;

      // White background
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(0, 0, size, size);

      // Draw QR modules with rounded dots
      const dotSize = cellSize * 0.85;
      const radius = dotSize / 2;

      for (let row = 0; row < moduleCount; row++) {
        for (let col = 0; col < moduleCount; col++) {
          if (qr.isDark(row, col)) {
            const x = col * cellSize + cellSize / 2;
            const y = row * cellSize + cellSize / 2;

            // Skip center area for logo
            const centerX = size / 2;
            const centerY = size / 2;
            const logoRadius = 38;
            if (Math.abs(x - centerX) < logoRadius && Math.abs(y - centerY) < logoRadius) {
              continue;
            }

            // Color: navy blue
            ctx.fillStyle = '#1B2845';

            // Check if it's a finder pattern (corners)
            const isFinderArea =
              (row < 7 && col < 7) ||
              (row < 7 && col >= moduleCount - 7) ||
              (row >= moduleCount - 7 && col < 7);

            if (isFinderArea) {
              // Square modules for finder patterns
              ctx.fillRect(
                col * cellSize + (cellSize - dotSize) / 2,
                row * cellSize + (cellSize - dotSize) / 2,
                dotSize,
                dotSize
              );
            } else {
              // Rounded dots for data
              ctx.beginPath();
              ctx.arc(x, y, radius, 0, Math.PI * 2);
              ctx.fill();
            }
          }
        }
      }

      // Update PNG download link
      const pngLink = document.getElementById('dlPng');
      pngLink.href = canvas.toDataURL('image/png');
    }

    function downloadSVG() {
      const url = document.getElementById('targetUrl').value.trim();
      if (!url) { alert('Lütfen bir URL girin'); return; }

      const qr = qrcode(0, 'H');
      qr.addData(url);
      qr.make();

      const moduleCount = qr.getModuleCount();
      const cellSize = 10;
      const size = moduleCount * cellSize;
      const logoRadius = size * 0.13;

      let svgParts = [];
      svgParts.push(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${size + 40} ${size + 40}" width="${size + 40}" height="${size + 40}">`);
      svgParts.push(`<rect width="100%" height="100%" fill="white"/>`);
      svgParts.push(`<g transform="translate(20,20)">`);

      for (let row = 0; row < moduleCount; row++) {
        for (let col = 0; col < moduleCount; col++) {
          if (qr.isDark(row, col)) {
            const x = col * cellSize + cellSize / 2;
            const y = row * cellSize + cellSize / 2;
            const cx = size / 2;
            const cy = size / 2;
            if (Math.abs(x - cx) < logoRadius && Math.abs(y - cy) < logoRadius) continue;

            const r = cellSize * 0.42;
            const isFinderArea =
              (row < 7 && col < 7) ||
              (row < 7 && col >= moduleCount - 7) ||
              (row >= moduleCount - 7 && col < 7);

            if (isFinderArea) {
              svgParts.push(`<rect x="${col * cellSize}" y="${row * cellSize}" width="${cellSize}" height="${cellSize}" fill="#1B2845" rx="1"/>`);
            } else {
              svgParts.push(`<circle cx="${x}" cy="${y}" r="${r}" fill="#1B2845"/>`);
            }
          }
        }
      }

      // Add center logo background
      const logoSize = logoRadius * 2 + 10;
      const logoX = size / 2 - logoSize / 2;
      const logoY = size / 2 - logoSize / 2;
      svgParts.push(`<rect x="${logoX}" y="${logoY}" width="${logoSize}" height="${logoSize}" rx="8" fill="#2C3E6B"/>`);
      svgParts.push(`<rect x="${logoX + 2}" y="${logoY + 2}" width="${logoSize - 4}" height="${logoSize - 4}" rx="6" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>`);

      // MG logo paths scaled to fit
      const lScale = logoSize * 0.006;
      const lOffsetX = logoX + logoSize * 0.1;
      const lOffsetY = logoY + logoSize * 0.15;
      svgParts.push(`<g transform="translate(${lOffsetX}, ${lOffsetY}) scale(${lScale})">`);
      svgParts.push(`<path d="M8,70 L8,38 C8,20 18,10 28,10 C38,10 44,20 44,32 L44,70" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>`);
      svgParts.push(`<path d="M44,70 L44,38 C44,20 54,10 64,10 C74,10 78,20 78,32" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>`);
      svgParts.push(`<path d="M110,25 C105,15 95,10 85,10 C72,10 62,22 62,40 C62,58 72,70 85,70 C95,70 105,65 110,55 L110,42 L90,42" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>`);
      svgParts.push(`</g>`);

      svgParts.push(`</g></svg>`);

      const svgData = svgParts.join('\n');
      const blob = new Blob([svgData], { type: 'image/svg+xml' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'mira-gundem-qr.svg';
      link.click();
    }

    // Auto-generate on load
    window.addEventListener('DOMContentLoaded', generateQR);
  </script>

</body>
</html>
