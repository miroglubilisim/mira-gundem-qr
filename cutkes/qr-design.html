<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cutkes QR Kart</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #E5E7EB;
      font-family: 'Inter', sans-serif;
    }

    .qr-card {
      width: 420px;
      background: #FFFFFF;
      border-radius: 24px;
      padding: 48px 40px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    /* ── QR Code ── */
    .qr-wrapper {
      width: 320px;
      height: 320px;
      margin-bottom: 28px;
    }
    .qr-wrapper img {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Thin brand accent line ── */
    .accent-line {
      width: 40px;
      height: 2px;
      background: #2BBDC1;
      margin-bottom: 20px;
    }

    /* ── Slogan ── */
    .slogan {
      font-size: 1.2rem;
      font-weight: 700;
      color: #1F2937;
      text-align: center;
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .sub-text {
      font-size: 0.78rem;
      font-weight: 400;
      color: #9CA3AF;
      text-align: center;
      margin-bottom: 24px;
    }

    /* ── Scan CTA ── */
    .scan-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      background: #2BBDC1;
      color: #FFFFFF;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .scan-cta svg {
      width: 16px;
      height: 16px;
    }
  </style>
</head>
<body>
  <div class="qr-card">
    <!-- QR Code (logo is already inside) -->
    <div class="qr-wrapper">
      <img src="cutkes-qr-styled.png" alt="Cutkes QR">
    </div>

    <!-- Accent -->
    <div class="accent-line"></div>

    <!-- Slogan -->
    <div class="slogan">Tara. Keşfet. Randevunu Al.</div>
    <div class="sub-text">Kuaförden dövmeciye, tüm hizmetler tek uygulamada.</div>

    <!-- CTA -->
    <div class="scan-cta">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="3" height="3"/>
        <line x1="21" y1="14" x2="21" y2="14.01"/>
        <line x1="21" y1="21" x2="21" y2="21.01"/>
        <line x1="14" y1="21" x2="14" y2="21.01"/>
      </svg>
      Kameranı aç ve tara
    </div>
  </div>
</body>
</html>
